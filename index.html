<!DOCTYPE html>
<html>
<head>
<title>SOS Youth Home Khairpur</title>
<style>
body{
font-family: Arial;
background: linear-gradient(to right,#4facfe,#00f2fe);
text-align:center;
}

.container{
background:white;
width:70%;
margin:auto;
padding:20px;
border-radius:15px;
box-shadow:0px 0px 15px gray;
}

h1{
color:darkblue;
}

h2{
background:green;
color:white;
padding:8px;
border-radius:8px;
}

table{
width:100%;
margin-top:20px;
}

input{
padding:6px;
width:95%;
}

button{
padding:10px 20px;
background:blue;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:darkblue;
}
</style>
</head>

<body>

<div class="container">

<h1>SOS Youth Home Khairpur</h1>
<h2>Entry of Visitors</h2>

<form>
<table border="1" cellpadding="10">
<tr>
<th>Name</th>
<th>Date</th>
<th>In Timing</th>
<th>Out Timing</th>
</tr>

<tr>
<td><input type="text" required></td>
<td><input type="date" required></td>
<td><input type="time" required></td>
<td><input type="time" required></td>
</tr>
</table>

<br>
<button type="submit">Submit</button>
</form>

</div>

</body>
</html>
