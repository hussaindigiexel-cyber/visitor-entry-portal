<form id="visitorForm">
<table border="1" cellpadding="10" width="100%">
<tr>
<th>Name</th>
<th>Date</th>
<th>In Timing</th>
<th>Out Timing</th>
</tr>
<tr>
<td><input type="text" name="name" required></td>
<td><input type="date" name="date" required></td>
<td><input type="time" name="in_time" required></td>
<td><input type="time" name="out_time" required></td>
</tr>
</table>
<br>
<button type="submit">Submit</button>
</form>

<script>
const form = document.getElementById('visitorForm');
form.addEventListener('submit', e => {
  e.preventDefault();
  const data = new FormData(form);

  fetch('https://script.google.com/macros/s/AKfycbwofYkVOQGjt7TC-B1t8sjE8sSLu-e59kH4-wNQBx3X7COk9M_t4fB4yiupHD9rNG_LNA/exec', {
    method: 'POST',
    body: data
  })
  .then(response => response.text())
  .then(data => {
    alert("Record Saved Successfully!");
    form.reset();
  })
  .catch(error => {
    alert("Error Saving Record");
  });
});
</script>
